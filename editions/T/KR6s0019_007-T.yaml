body:
  text: 翻譯名義集七姑蘇景德寺普潤大師法雲篇寺塔壇幢篇第五十九犍椎道具篇第六十沙門服相篇第六十一齋法四食篇第六十二篇聚名報篇第六十三統論二諦篇第六十四寺塔壇幢篇第五十九裕師寺誥云寺是攝十方一切眾僧修道境界法為待一切僧經游來往受供處所無彼無此無主無客僧理平等同護佛法故其中飲食眾具悉是供十方凡聖同有鳴鐘作法普集僧眾同時共受與檀越作生福之田如法及時者皆無遮礙是宜開廓遠意除蕩鄙懷不吝身財護持正法西域記云諸僧伽藍頗極奇製隅樓四起重閣三層榱梠棟梁奇形雕榱戶牖垣墻圖畫眾彩梁僧傳云相傳外國國王嘗毀破諸寺唯招提寺未及毀壞夜一白馬繞塔悲嗚即以啟王王即停壞因改招提以為白馬故諸寺立名多取則焉僧史略云鴻臚寺者本禮四夷遠國之邸舍也尋令別擇洛陽西雍門外蓋一精舍以白馬馱經來故用白馬為題寺者釋名曰嗣也治事者相嗣續於其內本是司名西僧乍來權止公司移入別居不忘其本還標寺號準天人陸玄暢云周穆王時文殊目連來化穆王從之即列子所謂化人者是也化人示穆王高四臺是迦葉佛說法處因造三會道場又云周穆王身游大夏佛告彼土有古塔可反禮事王問何方答在鄗京之東南也又問周穆已後諸王建置塔寺何為此土文紀罕見答立塔為於前緣多是神靈所造人見者少故文字少傳楊雄劉向尋於藏書往往見有佛經豈非秦前已有經塔或名僧坊者別屋謂之坊也或名精舍者釋迦譜云息心所栖故曰精舍靈裕寺誥曰非麁暴者所居故云精舍藝文類云非由其舍精妙良由精練行者所居也或名道場肇師云修道之場隋煬帝勅天下寺院皆名道場止觀云道場清淨境界治五住糠顯實相米或名蓮社者社即立春秋後五戊日名社群農結會祭以祈穀白虎通曰王者所以有社何為天下求福報土非土不食土廣不可遍敬故封土以立社往生傳云東晉遠法師憩跡廬阜一百二十三人締結方外之游於是相與而有蓮社之想焉今之以蓮社云云蓋其始也剎摩正音掣多羅此云土田淨名略疏云萬境不同亦名為剎垂裕云蓋取莊嚴差別名之為剎此乃通指國土名剎又復伽藍號梵剎者如輔行云西域以柱表剎示所居處也梵語刺力割瑟胝此云竿即幡柱也長阿含云若沙門於此法中勤苦得一法者便當竪幡以告四遠今有少欲人又法華云表剎甚高廣此由塔婆高顯大為金地標表故以聚相長表金剎如法苑云阿育王取金華金幡懸諸剎上塔寺低昂羅摩此云院周垣小院招提經音義云梵云招鬪提奢唐言四方僧物但筆者訛稱招提此翻別房施或云對面施或云梵言僧鬘此翻對面施音義云體境交現曰對輟己慧他名施後魏太武始光元年造伽藍創立招提之名僧祇此云四方僧物律鈔四種常住一常住常住謂眾僧厨庫寺舍眾具華果樹林田園僕畜等以體局當處不通餘界但得受用不通分賣故重言常住二十方常住如僧家供僧常食體通十方唯局本處此二名僧祇物三現前現前謂僧得施之物唯施此處現前僧故四十方現前如亡五眾輕物也若未羯磨從十方僧得罪若已羯磨望現前僧得罪此二名現前僧物阿蘭若或名阿練若大論翻遠離處薩婆多論翻閑靜處天台云不作眾事名之為閑無憒鬧故名之為靜或翻無諍謂所居不與世諍即離聚落五里處也肇云忿競生乎眾聚無諍出乎空閑故佛讚住於阿蘭若應師翻空寂苑師分三類一達磨阿蘭若即華嚴之初謂說諸法本來湛寂無起作義二名摩登伽阿蘭若謂塚間處要去村落一俱盧舍大牛吼聲所不及處三名檀陀迦阿蘭若謂沙磧之處也磧遷歷切僧伽藍譯為眾園僧史略云為眾人園圃園圃生植之所佛弟子則生殖道芽聖果也那爛陀西域記曰唐云施無厭此伽藍南菴沒羅園中有池其龍名那爛陀旁建伽藍因取其稱從其實議是如來昔行菩薩道時為大國王建都此地憐愍眾生好樂周給時美其德號施無厭大宋僧傳云那爛陀寺周圍四十八里九寺一門是九天王所造西域伽藍無如其廣矣菴羅園闡義云菴羅是果樹之名其果似桃或云似奈此樹開華華生一女國人歎異以園封之園既屬女女人守護故言菴羅樹園宿善冥熏見佛歡喜以園奉佛佛即受之而為所住迦蘭陀善見律及經律異相云是山鼠之名也時毘舍離王入山於樹下眠有大毒虵欲出害王於此樹下有鼠下來鳴令王覺王感其恩將一村食供此山鼠乃號此村為迦蘭陀而此村中有一長者居金錢四十億王即賜於長者之號由此村故所以名為迦蘭陀長者也三藏傳云園主名迦蘭先以此園施諸外道後見佛又聞深法恨不以園得施如來時地神知其意為現災怪怖諸外道逐之令出告曰長者欲以園施佛汝宜速去外道含怒而出長者歎喜建立精舍躬往請佛林微尼或流彌尼或藍毘尼或嵐毘尼此云解脫處亦翻斷亦翻滅華嚴音義翻樂勝圓光由昔天女來故立此名新云藍軬扶晚尼此云監即上古守園女名秣蘇伐那西域記云唐言闇林千佛皆於此地說法佛滅三百年有迦多衍那於此製發智論阿奢理貳西域記云唐言奇特鷄頭摩竦疏釋鷄園引智論云昔有野火燒林林中有雉入水漬羽以救其焚纂要云即鷄頭摩寺窣堵波西域記云浮圖又曰偷婆又曰私偷簸皆訛也此翻方墳亦翻圓塚亦翻高顯義翻靈廟劉熙釋名云廟者貌也先祖形貌所在也又梵名塔婆發軫曰說文元無此字徐鉉新加云西國浮圖也言浮圖者此翻聚相戒壇圖經云原夫塔字此方字書乃是物聲本非西土之號若依梵本瘞猗厲佛骨所名曰塔婆後分經佛告阿難佛般涅槃荼毘既訖一切四眾收取舍利置七寶瓶當於拘尸那城內四衢道中起七寶塔高十三層上有輪相云云辟支佛塔應十一層阿羅漢塔成以四層亦以眾寶而嚴飾之其轉輪王亦七寶成無復層級何以故未脫三界諸有苦故十二因緣經八種塔並有露槃佛塔八重菩薩七重辟支佛六重四果五重三果四二果三初果二輪王一凡僧但蕉葉火珠而已言輪相者僧祇云佛造迦葉佛塔上施槃蓋長表輪相經中多云相輪以人仰望而瞻相也支提或名難提脂帝制底制多此翻可供養處或翻滅惡生善處雜心論云有舍利名塔無舍利名支提文句云支提無骨身者也阿含明四支徵謂佛生處得道處轉法輪處入滅處也舍磨奢那此云冡西域僧死埋骨地下上累甎石似窣堵波但形卑小健陀俱胝義淨云西方名佛堂為健陀俱胝此云香室毘訶羅此云游行處謂僧游履處也滿茶邏力箇切此翻壇新云正名曼茶羅言壇者鄭玄注禮云封土曰壇除地曰墠常演封者起土界也壇之言坦也坦明貌也漢書音義云築土而高曰壇除地平坦曰場國語云壇之所除地曰場除掃也周書曰為三壇同墠墠除地也說文云野土也爾雅云鹿之所息謂之場詩云九月築場圃注云春夏為圃秋冬為場場即平治土面於上治穀脫闍資中翻幢熏聞云闍視遮切有作都音引爾雅云闍謂之臺而言脫者積土脫落也今所不取蓋是梵語故拘吒迦此云小舍犍稚道具篇第六十菩薩戒經云資生順道之具中阿含云所蓄物可資身進道者即是增長善法之具辯正論云沙門者行超俗表心游塵外故應器非廊廟所陳染衣異朝宗之服北山錄云簠音甫簋音軌祭器內圓外方俎莊呂切肉爼也豆制度文章為禮之器升降上下周旋先的襲似立為禮之文鐘鼓管磬羽籥干戚籥音藥先王制舞文以羽籥干戚籥如笛三孔而短干盾也戚矛也為樂之器屈伸俯仰綴兆舒疾為樂之文置茲則禮樂廢矣繕寫繢刻香臺法机為道德之器髠祖拜繞禪講齋戒為道德之文弛茲則道德微矣犍巨寒椎音地聲論翻為磬亦翻鐘資持云若諸律論並作犍槌或作犍椎今須音槌為地又羯磨疏中直云犍地未見椎字呼為地也後世無知因茲一誤至於鈔文一宗祖教凡犍槌字並改為稚直呼為地請尋古本及大藏經律考之方知其謬今須依律論并作犍槌至呼召時自從聲論增一云阿難升講堂擊犍椎者此是如來信鼓也五分云諸比丘布薩時不時集妨行道佛言當唱時至若打犍椎若打鼓吹螺使舊住沙彌淨人打不得多應打三通若唱二時至亦使沙彌淨人唱住處多不得遍聞應高處唱猶不知集更相語知若無沙彌比丘亦得打事鈔云若尋常所行生椎之始必漸發聲漸希漸大乃至聽盡方打一通佛在世時但有三下故五分云打三通也後因他請方有長打然欲初鳴時當依經論建心標為必有感徵應至鐘所禮三寶訖具儀立念我鳴此鐘者為召十方僧眾有得聞者並皆雲集共同和利又諸惡趣受苦眾生令得停息故付法藏傳中罽膩吒王以大殺害故死入千頭魚中劍輪繞身而轉隨斫隨生羅漢為僧維那依時打鐘若聞鐘聲劍輪在空知是因緣遺信白令長打使我苦息過七日已受苦即息江南上元縣一民時疾暴死心氣尚暖凡三日復甦乃誤勾也自言至一殿庭間忽見先主被五木縲械甚嚴民大駭竊問曰主何至於斯耶主曰吾為宋齊丘所誤殺和州降者千餘人以冤訴因此主問其民曰汝何至斯耶其民具道誤勾之事主聞其民却得生還喜且泣曰吾仗汝歸語嗣君凡寺觀鳴鐘當延之令永吾受苦惟聞鐘則暫休或能為吾造一鐘尤善民曰我下民耳無緣得見設見之胡以為驗主沈慮曰吾在位嘗與于闐國交聘遺吾一玉瑞天王吾愛之嘗置於髻受百官朝一日如廁忘取之因感頭痛夢神謂我曰玉天王寘於佛塔或佛體中則當愈吾因獨引一匠𢹂於瓦棺寺鑿佛左膝以藏之香泥自封無一人知者汝以此事可驗民既還家不敢輒已遂乞見主具白之果曰冥寞何憑民具以玉天王之事陳之主親詣瓦棺剖佛膝果得之感泣慟躄遂立造一鐘於清涼寺鐫其上云薦烈祖孝高皇帝脫幽出厄以玉像建塔葬於蔣山智興鳴鐘事出法苑增一云若打鐘時一切惡道諸苦並得停止應法師準尼鈔云時至應臂吒犍槌應師釋云梵語臂吒此云打梵語犍槌此云所打之木或檀或桐此無正翻彼無鐘磬故也音義指歸斥云祇如梵王鑄祇桓寺金鐘又迦葉結集撾陟瓜切椎也銅犍槌豈無鐘耶但天竺未知有磬五分律云隨有瓦木銅鐵鳴者皆名犍地又律中集僧有七種法一量影二破竹作聲三作煙四吹貝五打鼓六打犍槌七唱諸大德布薩說戒時到事鈔明入堂法應在門外偏袒右肩歛手當心攝恭敬意擬堂內僧并同佛想緣覺羅漢想何以故三乘同法食故次欲入堂若門西坐者從戶外旁門西頰先舉左脚定心而入若出門者還從西頰先舉右脚而出若在門東坐者反上可知不得門內交過若欲坐時以衣自蔽勿露形醜須知五法一須慈敬重法尊人二應自卑下如拭塵巾三應知坐起俯仰得時四在彼僧中不為雜語五不可忍事應作默然凡徒眾威儀事在嚴整清潔軌行可觀則生世善心天龍叶贊華嚴云具足受持威儀教法是故能令僧寶不斷智論云佛法弟子同住和合一者賢聖說法二者賢聖默然準此處眾唯施二事不得雜說世論類於污家能說能戲也又貴靜攝不在喧亂誦經說法必須知時成論云雖是法語說不應時名為綺語後裔住持願遵斯式舍羅四分此云籌五分籌極短並五指極長拳一肘極麁不過小指極細不得減箸十誦云為檀越問僧不知數佛令行籌不知沙彌數行籌數之若人施布薩物沙彌亦得雖不往布薩羯磨處由受籌故四分為受供行籌通沙彌也若未受十戒亦得受籌以同受供故業疏三種行籌一頭露二覆藏以物覆籌三耳語耳畔勸勉事鈔云今僧寺中有差僧次請而簡客者此僧次翻名越次也即令客僧應得不得主人犯重隨同情者多少通是一盜隙棄羅此云錫校由振時作錫錫聲故十誦名聲杖錫杖經又名智杖亦名德杖彰智行功德故聖人之幖幟賢士之明記道法之幢根本雜事云比丘乞食深入長者之家遂招譏謗比丘白佛佛云可作聲警覺彼即呵呵作聲喧閙復招譏毀佛制不聽遂拳打門家人怪問何故打破我門默爾無對佛言應作錫杖苾芻不解佛言杖頭安鐶圓如醆仄限口安小鐶子搖動作聲而為警覺動可一二無人聞時即須行去五百問論持錫有多事能警惡蟲毒獸等義淨云錫杖都有三分上分是錫中木下或牙角也若二股六鐶是迦葉佛製若四股十二鐶是釋迦佛製齊稠禪師在懷州王屋山聞虎鬪以錫杖解之因成頌云本自不求名剛被名求我巖前解二虎障却第三果又鄧隱峯飛錫空中解於二陣刺竭節此云杖楖栗橫擔不顧人直入千峯萬峯去軍遲此云瓶寄歸傳云軍持有二若甆瓦者是淨用若銅鐵者是觸用西域記云捃稚迦即澡瓶也舊云軍持訛略也西域尼畜軍持僧畜澡灌謂雙口澡灌事鈔云應法澡灌資持云謂一斗已下鉢里薩羅伐拏此云濾水羅會正記云西方用上白㲲東夏宜將密絹若是生絹小蟲直過可取熟絹四尺捉邊長挽兩頭刺著即是羅樣兩角施帶兩畔直怐音冠似鼎銨也中安橫杖尺六兩邊繫柱下以盆承傾水時罐底須入羅內如其不爾蟲隨水落墮地墮盆還不免殺僧祇蟲細者三重漉毘尼母應作二重漉水囊若猶有應作三重不得夾作恐中間有蟲難出當各作捲逐重覆却方護生也根本百一羯磨明五種水羅一方羅用絹三尺或二尺隨時大小作二法瓶陰陽瓶也三君遲以絹繫口以繩懸沈於水中待滿引出四酌水羅五衣角羅但取密絹方一塔手或繫瓶口或安鉢中濾水用也鉢塞莫或云阿唎吒迦二合此云數珠木槵子經云當貫木槵子一百八個常自隨身志心稱南無佛陀南無達摩南無僧伽乃過一子具如彼經鉢多羅此云應器發軫云應法之器也謂體色量三皆須應法體者大要有二泥及鐵也色者熏作黑赤色或孔雀咽色鴿色量者大受三斗小受斗半中品可知又翻為薄謂治厚物令薄而作此器南山云此姬周之斗也準唐斗上鉢一斗下鉢五升五分云佛自作鉢坏以為後式受時準十誦云大德一心念我比丘某甲此鉢多羅應量受常用故三說若捨準衣律云比丘持木鉢佛言不應持如是鉢此是外道法鍵音䖍𨩲音咨母論譯為淺鐵鉢經音疏云鉢中之小鉢今呼為鐼音訓子十誦律云鉢半大鍵𨩲小鍵𨩲四分律云鍵𨩲入小鉢小鉢入次鉢次鉢入大鉢或作捷茨建鎡並梵音輕重俱夜羅此云隨鉢器法寶解云即匙筋鍵𨩲等浮囊五分云自今聽諸比丘畜浮囊若羊皮若牛皮傳聞西域渡海之人多作鳥翎毛袋或齎巨牛脬海船或失吹氣浮身沙門服相篇第六十一大論云釋子受禁戒是其性剃髮割截染衣是其相道宗鈔云儀即沙門相也削髮壞衣是體即沙門性也無表戒法是僧祇云三衣者賢聖沙門之幖幟四分云三世如來並著如是衣大品明十二頭陀衣有二種一者納衣智論釋云好衣因緣故四方追逐墮邪命中若受人好衣則生親著若不親著檀越則恨又好衣是未得道者生貪著處好衣因緣招致賊難或至奪命有如是等患故受弊納衣法二但三衣智論釋云行者少欲知足衣趣蓋形不多不少故受三衣白衣求樂故多畜種種衣或有外道苦行故裸形無恥是故佛弟子捨二邊處中道北山云憍陳如弊服五錢須菩提華房百寶俱聖人也衡嶽終身一衲玄景每曙更衣俱高僧也克不克在于我可不可不不在乎物也震越應法師云此翻玄服應是臥具釋名曰服上曰衣衣依也所以庇寒暑也傳云衣身之章也上曰衣下曰裳白虎通曰衣者隱也裳者障也所以隱形自障蔽也涅槃云如世衣裳障覆形體袈裟具云迦羅沙曳此云不正色從色得名章服儀云袈裟之目因於衣色如經中壞色衣也會正云準此本是草名可染衣故將彼草目此衣號十誦以為敷具謂同氈席之形四分以為臥具謂同衾被之類薩婆多云臥具者三衣之名大淨法門經云袈裟者晉名去穢大集經名離染服賢愚名出世服真諦雜記云袈裟是外國三衣之名名含多義或名離塵服由斷六塵故或名消瘦服由割煩惱故或名蓮華服服者離著故或名間色服以三如法色所成故言三色者律有三種壞色青黑木蘭青謂銅青黑謂雜泥木蘭即樹皮也業疏云聽以刀截成沙門衣不為怨賊所剝故章服儀云條堤之相事等田疇如畦貯水而養嘉苗譬服此衣生功德也佛令象此義不徒然五分云衣下數破當倒被之在雨中行水入葉中應順被之章服儀云比見條葉不附正儀當馬齒鳥足縫之即須順左右條開明孔不作即同縵衣南山問比見西域僧來多縫衣葉者何答此佛滅後將二百年北天竺僧與外道同住外道嫉之密以利刀內衣葉中同往王所外道告王沙門釋子內藏利刀欲將害王因告檢獲由此普誅一國比丘時有耶舍阿羅漢令諸比丘權且縫合為絕命難此乃彼方因事權制非佛所開故義淨云西國三衣並皆刺合唯東夏開而不縫依律大衣限五日成七條四日成五條二日成限日不成尼犯墮比丘突吉羅業疏云若有衣不受持者突吉羅下二衣有長者開將作從悲華經云佛於寶藏佛前發願願成佛時袈裟有五功德一入我法中犯重邪見等於一念中敬心尊重必於三乘授記二天龍人鬼若能敬此袈裟少分即得三乘不退三若有鬼神諸人得袈裟乃至四寸飲食充足四若眾生共相違背念袈裟力尋生慈心五若持此少分恭敬尊重常得勝他瓔珞經云若天龍八部鬪爭念此袈裟生慈悲心海龍王經龍王白佛如此海中無數種龍有四金翅常來食之願佛擁護令得安穩於是世尊脫身卓衣告龍王汝取是衣分與諸龍皆令周遍於中有值一縷之者金翅鳥王不能觸犯持禁戒者所願必得搜玄引大集王問比丘不能說遂羞墮地袈裟變白法滅盡經云沙門袈裟自然變白應法師云韻作𣮫㲚音加沙葛洪字范始改從衣僧伽梨西域記云僧迦胝舊訛云僧伽梨此云合又云重謂割之合成義淨云僧迦胝唐言重複衣靈感傳云每轉法輪披僧迦梨南山云此三衣名諸部無正翻今以義譯大衣名雜碎衣以條數多故若從用為名則曰入王宮聚落時衣乞食說法時著薩婆多論大衣分三品九條十一條十三條兩長一短名下品十五條十七條十九條三長一短名中品二十一條二十三條二十五條四長一短名上品會正記問所以長增而短少者業疏云法服敬田為利諸有表聖增而凡減也業疏云今準十誦加持應云大德一心念我比丘某甲是僧伽梨若干條衣受若干長若干短割截揲葉衣持三說會正記云如缺大衣下二衣有長者開將作從去聲受持應加云大德一心念我某甲比丘此安陀會二十五條衣受四長一短割截衣持三說僧祇云有緣須捨者具修威儀加法云大德一心念我比丘某甲此僧伽梨是我三衣數先受持今捨一說下二衣亦爾欝多羅僧或郁多羅僧此譯上著衣即七條也南山云七條名中價衣從用云入眾時衣禮誦齋講時著若受應加法云此欝多羅僧七條衣受兩長一短割截衣持三說如缺七條開將上下二衣作從加法例上安陀會或安怛羅婆沙此云中宿衣謂近身住也南山云五條名下衣從用云院內行道雜作衣若受應加法云此安陀會五條衣受一長一短割截衣持三說如缺五條開將上二衣作從五分云獨住比丘三衣中須有換易者應具修威儀手執衣心生口言加法云云菩薩經云五條名中著衣七條名上衣大衣名眾集時衣戒壇經云五條下衣斷貪身也七條中衣斷嗔口也大衣上衣斷癡心也華嚴云著袈裟者捨離三毒四分云懷抱於結使不應被袈裟鉢吒唐言縵條即是一幅㲲無田相者三衣俱通縵也佛法至此一百八十七年出家未識割截秪著此衣尼師壇或尼師但那此名坐具或云隨坐衣業疏佛言為身為衣為臥具故制畜之長四廣三更增半磔手者善見云令於縷際外增之迦留陀夷身大坐不容故加半磔十誦云新者二重故者四重十誦云不應受單者離宿突吉羅戒壇經云尼師壇如塔之有基也汝今受戒即五分法身之基也良以五分由戒而成若無坐具以坐汝身則五分定慧無所從生天神黃瓊云元佛初度五人及迦葉兄弟並制袈裟左臂坐具在袈裟下云云後度諸眾徒侶漸多年少比丘儀容端美入城乞食多為女愛由是製衣角在左肩後為風飄聽以尼師壇鎮上後外道達摩多問比丘肩上片布持將何用答曰擬將坐之云云達摩多云此衣既為可貴有大威靈豈得以所坐之布而居其上云云比丘白佛由此佛製還以衣角居于左臂坐具還在衣下但不得垂尖角如象鼻羊耳等相摩得勒伽云若離宿不須捨業疏云受應加云大德一心念我比丘某甲此尼師壇應量作今受持三說若捨準上僧祇支或僧却崎西域記云唐言掩腋舊或名竭支正名僧迦鵄此云覆腋衣用覆左肩右開左合竺道祖云魏時請僧於內自恣宮人見僧偏袒不以為善遂作此衣施僧因綴於左邊祇支上因而受稱即偏衫右邊今隱祇支名通號兩袖曰偏衫今作時須開後縫截領以存元式故也泥縛些桑箇那或云泥伐散那西域記唐言裙云云舊曰涅槃僧訛也既無帶襻其將服也集衣為襵之涉切廣雅襵襞也通俗文曰便縫曰襵束帶以條襵則諸部各異色乃黃赤不同釋名云裠群也連接群幅也舍勒應法師譯云內衣也半者言舍勒相短似今短群也小衣論雖不顯於相可類半泥洹也迦絺那明了論云為存略故但言迦提此翻功德以坐夏有功五利賞德也西域記以迦提翻昂星昂星直此月故律鈔引明了論翻為堅實能感實能感多衣衣無敗壞故又名難活以貧人取活為難捨少財入此衣功德勝如以須彌大衣聚施也或云堅固又云廕覆古翻為賞善罰惡衣賞前安居人後安居人不得也亦翻功德衣以僧眾同受此衣招五利功德律中受此衣故畜長財離衣宿背請別眾食食前食後至他家四分云安居竟應受功德衣則前安居人七月十六日受至十二月十五日捨四分云若得新衣若檀越施衣若糞掃衣四分云糞掃者則非死人衣新物揲作淨若已浣浣已納作淨即日來不經宿不以邪命得應法四周有緣五條作十隔用袈裟色受捨應鳴鐘集僧羯磨具出自恣篇憍奢耶應法師翻蟲衣謂用野蠶絲綿作衣事鈔云即黑毛臥具寧音義云梵云高世耶譯云野蠶綿東天竺有國名烏陀粳米欲熟葉變為蟲蟲則食米人取蒸以為綿也如此絲綿者名摩呵㕹多此言大衣衣甚貴即大價之衣感通傳云伏見西來梵僧咸著布㲲具問答云五天竺國無著蠶衣由此興念著斯章服儀屈眴音舜此云大細布緝木綿華心織成其色青黑即達磨所傳袈裟睒婆上或染切此云木綿劫波育或言劫具即木綿也正言迦波羅此樹華名也可以為布高昌名㲲罽賓國南大者成樹已北形小狀如土蔡有殼剖以出華如柳絮可紐女真女真以為布迦隣陀衣細錦衣也兜羅綿兜羅此云細香苑音義翻氷或云兜沙此云霜斯皆從色為名或名妬羅綿妬羅樹名綿從樹生因而立稱如柳絮也亦翻楊華或稱兜羅毦而使者毛毳也熏聞云謂佛手柔軟加以合縵似此綿也瞿修羅此云圖像從其衣形而立名若著瞿修羅則不著僧迦鵄尼衛此云裏衣欽跋羅即毛頭鳩羅此云細布芻摩此云麻衣西域記云衣麻之類也麻形細荊芥葉青色西域麻少多用草羊毛顩鉢羅西域記云織細羊毛褐賴縭西域記云織野獸毛細軟可得緝績故以見珍而充服用兜那波吒此云絹俱蘇摩此云華摩羅此云鬘苑師云一切華通名俱蘇摩別有一華獨名俱蘇摩此云悅意其華大小如錢色甚鮮白眾多細葉圓集共成應法師云西域結鬘師多用蘇摩羅華行列結之以為條貫無問男女貴賤皆此莊嚴或首或身以為飾好正法念云生天華鬘在額齋法四食篇第六十二佛地論云任持名食謂能任持色身令不斷壞長養善法身依食住命託食存流入五臟充浹四肢補氣益肌身心適悅食有三德一輕軟二淨潔三如法味有六種謂苦酸甘辛鹹淡楞嚴云如是世界十二類生不能自全依四食住所謂段食觸食思食識食是故佛言一切眾生皆依食住檇李釋曰言段食者段謂形段以香味觸三塵為體入腹變壞資益諸根故言段食起世經云麤段微細食閻浮提人飯麩夫少豆肉等名麤段食按摩澡浴拭膏等名微細食古譯經律皆名搏食說文搏圜也禮云無搏食通俗文手團曰搏熏聞云其義則局如漿飲等不可搏故於是後譯皆云段食言觸食者觸謂觸對取六識中相應觸對前境而生喜樂故名觸食通慧云如男與女相對為觸觸能資身故得食名準僧祇見色愛著名食豈非觸食義耶設非觸食何以觀戲劇等終日不食而自飽耶起世經云一切卵生得身故以觸為食流疏云冷暖觸等亦名觸食言思食者思謂意思取第六識相應思於可意境生希望故起世經云思食者若有眾生意思資潤諸根增長如魚鼈蛇蝦蟆伽羅瞿陀等及餘眾生以意思潤益諸根壽命者此等用思為食熏聞云相應觸及相應思者皆心所遍行法中也流疏云思想飲食令人不死亦名思食言識食者識即第八執持之相由前三食勢分所資令此識增勝能執持諸根大種故起世經云識食地獄眾生及無邊識處天等皆用識持以為其食若約三界辨之段食唯在欲界以色無色無香味二塵餘之三食遍通三界中陰但有三食亦有段食如雜心論云如人中陰還食人中所食香氣也但現陰麤故多藉耒糸段食中陰細故多藉三食耳此乃總敘四食也僧跋即等供之唱法也寄歸傳云三鉢羅佉多舊訛云僧跋梵摩難國王經云夫欲施食者皆當平等不問大小於是佛令阿難臨飯唱僧跋僧跋者眾僧飯皆平等故莊嚴論明尸利毱多長者受外道囑以毒和食請佛及眾佛知令阿難唱僧跋唱已方食唱已毒散事鈔云況僧食十方普同彼取自分理應隨喜而人情忌陿用心不等或有閉門限礙客僧者不亦蚩乎鳴鐘本意豈其然哉出家捨著尤不應爾但以危脆之身不能堅護正法浮假之命不肯遠通僧食違諸佛之教損檀越之福傷一時眾情塞十方僧路傳謬後生所敗遠矣改前迷而復道不亦善哉梵語星分難遍求列篇舉要會群流總持三藏如觀掌顒望後賢為續周翻譯名義集卷第七夫翻譯名義集者姑蘇景德寺普潤大師法雲之所編也此書來于此國也蓋于茲有年矣以故往往鋟梓而傳于世亦尚矣粵有唐本以之點撿已廣之本則多有脫簡者是故考訂而補其闕略也又傍加倭點者其點不一準請於處處之學校而寫之者也定知有是處亦有非處仰而俟明者之添削也聊命工壽木以廣其傳焉維時寬永五戊辰仲冬上旬
